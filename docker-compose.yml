version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      # Points to the local 'mongo' service below by default. Override in a
      # .env file at the repo root to use Atlas instead - Docker Compose
      # automatically loads a root .env for variable substitution here.
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/scamshield}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY:-}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID:-}
      - PORT=5000
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
